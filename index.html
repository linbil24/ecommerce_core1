<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMarket - Loading</title>
    <style>
        /* Reset all styles */
        * {
            margin: 0;
            padding: 0;
            border: 0;
            box-sizing: border-box;
        }
        
        /* Basic body styling */
        body {
            background: #2B4560;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* Loading container */
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        /* Logo text */
        .logo {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        /* Tagline */
        .tagline {
            font-size: 20px;
            opacity: 0.9;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }
        
        /* Spinner */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid white;
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: rotate 1s linear infinite;
        }
        
        /* Loading text */
        .text {
            font-size: 16px;
            opacity: 0.8;
        }
        
        /* Animation */
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .logo { font-size: 48px; }
            .tagline { font-size: 18px; }
            .spinner { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="logo">iMarket</div>
        <div class="tagline">Your Market, Your Choice</div>
        <div class="spinner"></div>
        <div class="text">Loading marketplace...</div>
    </div>
    
    <!-- Simple redirect script -->
    <script>
        // Wait 2 seconds then redirect
        setTimeout(function() {
            window.location.href = '../php/login.php';
        }, 2000);
    </script>
</body>
</html>
