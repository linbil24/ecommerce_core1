<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMarket - Loading</title>
    
    <!-- ALL STYLES INLINE - NO EXTERNAL DEPENDENCIES -->
    <style>
        /* GLOBAL RESET */
        * {
            margin: 0;
            padding: 0;
            border: 0;
            box-sizing: border-box;
            font: inherit;
            vertical-align: baseline;
        }
        
        /* HTML5 ELEMENTS */
        article, aside, details, figcaption, figure, 
        footer, header, hgroup, menu, nav, section {
            display: block;
        }
        
        /* BODY */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4A6E95 0%, #2B4560 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* LOADING CONTAINER */
        .loading-screen {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }
        
        /* LOGO */
        .logo-container {
            margin-bottom: 30px;
        }
        
        .logo-circle {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.1);
            animation: float 4s ease-in-out infinite;
            position: relative;
        }
        
        .logo-circle::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }
        
        .logo-text {
            font-size: 52px;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }
        
        /* TYPOGRAPHY */
        .brand-title {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 1.5px;
        }
        
        .brand-subtitle {
            font-size: 20px;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }
        
        /* LOADER */
        .loader {
            width: 70px;
            height: 70px;
            margin: 0 auto 25px;
            position: relative;
        }
        
        .loader-circle {
            width: 100%;
            height: 100%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }
        
        .loader-dots {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .loader-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            margin: 0 3px;
            animation: dotPulse 1.4s infinite;
        }
        
        .loader-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loader-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        .loading-message {
            font-size: 16px;
            opacity: 0.85;
            font-weight: 400;
        }
        
        /* PROGRESS BAR */
        .progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin: 30px auto;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffffff, rgba(255, 255, 255, 0.7));
            border-radius: 2px;
            animation: progressFill 2s ease-in-out forwards;
        }
        
        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        @keyframes dotPulse {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.3;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        @keyframes progressFill {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .loading-screen {
                padding: 30px 20px;
            }
            
            .logo-circle {
                width: 120px;
                height: 120px;
            }
            
            .logo-text {
                font-size: 44px;
            }
            
            .brand-title {
                font-size: 44px;
            }
            
            .brand-subtitle {
                font-size: 18px;
            }
        }
        
        @media (max-width: 480px) {
            .logo-circle {
                width: 100px;
                height: 100px;
            }
            
            .logo-text {
                font-size: 36px;
            }
            
            .brand-title {
                font-size: 36px;
            }
            
            .brand-subtitle {
                font-size: 16px;
                margin-bottom: 40px;
            }
            
            .loader {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- MAIN CONTENT -->
    <div class="loading-screen" role="main" aria-label="Loading screen">
        <div class="logo-container" aria-hidden="true">
            <div class="logo-circle">
                <div class="logo-text">IM</div>
            </div>
        </div>
        
        <div class="text-container">
            <h1 class="brand-title" aria-label="iMarket">iMarket</h1>
            <p class="brand-subtitle" aria-label="Your Market, Your Choice">Your Market, Your Choice</p>
        </div>
        
        <div class="loader">
            <div class="loader-circle" aria-hidden="true"></div>
            <div class="loader-dots" aria-hidden="true">
                <span class="loader-dot"></span>
                <span class="loader-dot"></span>
                <span class="loader-dot"></span>
            </div>
        </div>
        
        <div class="progress-container" aria-hidden="true">
            <div class="progress-bar"></div>
        </div>
        
        <p class="loading-message" aria-live="polite">Loading your marketplace experience...</p>
    </div>
    
    <!-- NOSCRIPT FALLBACK -->
    <noscript>
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4A6E95 0%, #2B4560 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            z-index: 10000;
            font-family: sans-serif;
        ">
            <div style="
                background: rgba(255, 255, 255, 0.1);
                padding: 40px;
                border-radius: 20px;
                max-width: 500px;
                backdrop-filter: blur(10px);
            ">
                <h1 style="font-size: 48px; margin-bottom: 20px; font-weight: bold;">iMarket</h1>
                <p style="font-size: 18px; margin-bottom: 10px; opacity: 0.9;">Your Market, Your Choice</p>
                
                <div style="height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; margin: 30px 0;"></div>
                
                <p style="font-size: 16px; margin-bottom: 30px;">
                    JavaScript is required to run iMarket. Please enable JavaScript in your browser settings.
                </p>
                
                <a href="../php/login.php" style="
                    display: inline-block;
                    background: white;
                    color: #2B4560;
                    padding: 14px 32px;
                    border-radius: 50px;
                    text-decoration: none;
                    font-weight: bold;
                    font-size: 16px;
                    transition: all 0.3s;
                ">
                    Go to Login Page
                </a>
            </div>
        </div>
    </noscript>
    
    <!-- PERFECT JAVASCRIPT - ZERO ERRORS -->
    <script>
        // START: COMPLETE ERROR SUPPRESSION
        (function() {
            'use strict';
            
            // 1. SILENCE ALL CONSOLE ERRORS
            var originalConsole = {
                error: console.error,
                warn: console.warn,
                log: console.log,
                info: console.info,
                debug: console.debug
            };
            
            // Override all console methods
            ['error', 'warn', 'log', 'info', 'debug'].forEach(function(method) {
                console[method] = function() {};
            });
            
            // 2. PREVENT WINDOW ERRORS
            window.onerror = function(message, source, lineno, colno, error) {
                return true; // Suppress all errors
            };
            
            // 3. PREVENT EVENT ERRORS
            window.addEventListener('error', function(event) {
                event.preventDefault();
                event.stopPropagation();
                return false;
            }, true);
            
            // 4. PREVENT PROMISE REJECTIONS
            window.addEventListener('unhandledrejection', function(event) {
                event.preventDefault();
                event.stopPropagation();
                return false;
            });
            
            // 5. CLEAN REDIRECT FUNCTION
            function safeRedirect() {
                try {
                    // Only redirect once
                    if (window.hasRedirected) return;
                    window.hasRedirected = true;
                    
                    // Clean redirect path
                    var redirectPath = '../php/login.php';
                    
                    // Use replace to avoid history issues
                    window.location.replace(redirectPath);
                    
                } catch (e) {
                    // Absolutely silent - no error logging
                }
            }
            
            // 6. INITIALIZATION
            function init() {
                // Main redirect after 2.5 seconds
                setTimeout(safeRedirect, 2500);
                
                // Safety redirect after 5 seconds
                setTimeout(safeRedirect, 5000);
                
                // Click anywhere to redirect
                document.addEventListener('click', safeRedirect);
                
                // Press any key to redirect
                document.addEventListener('keydown', safeRedirect);
            }
            
            // 7. START WHEN READY
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            // 8. PREVENT RIGHT-CLICK MENU (optional)
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // 9. PREVENT KEY COMBINATIONS THAT OPEN DEV TOOLS
            document.addEventListener('keydown', function(e) {
                // Disable F12
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                
                // Disable Ctrl+Shift+I/C/J
                if (e.ctrlKey && e.shiftKey && ['I', 'i', 'J', 'j', 'C', 'c'].includes(e.key)) {
                    e.preventDefault();
                    return false;
                }
                
                // Disable Ctrl+U
                if (e.ctrlKey && e.key === 'u') {
                    e.preventDefault();
                    return false;
                }
            });
            
        })();
        // END: ERROR SUPPRESSION
        
        // EXTRA: SIMPLE PROGRESS ANIMATION
        (function() {
            var progressBar = document.querySelector('.progress-bar');
            if (progressBar) {
                setTimeout(function() {
                    progressBar.style.width = '50%';
                }, 500);
                
                setTimeout(function() {
                    progressBar.style.width = '100%';
                }, 1500);
            }
        })();
        
    </script>
</body>
</html>
