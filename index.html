<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMarket - Loading...</title>
    <!-- Favicon link with absolute root path for reliability -->
    <link rel="icon" type="image/png" href="https://core1.imarketph.com/image/logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4A6E95 0%, #2B4560 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .loader-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
        }

        .brand-name {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
            }

            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.4));
            }
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- v2.1 -->
    <div class="loader-container fade-in">
        <img src="https://core1.imarketph.com/image/logo.png" alt="iMarket Logo" class="logo-img">

        <div class="text-content">
            <h1 class="brand-name">iMarket</h1>
            <p class="tagline">Your Market, Your Choice</p>
        </div>

        <div class="spinner"></div>
    </div>

    <noscript>
        <meta http-equiv="refresh" content="3;url=https://core1.imarketph.com/php/login.php">
    </noscript>

    <script>
        (function () {
            var redirected = false;
            function doRedirect() {
                if (redirected) return;
                redirected = true;
                window.location.replace("https://core1.imarketph.com/php/login.php");
            }
            window.onload = function () {
                setTimeout(doRedirect, 2500);
            };
            // Fallback if onload doesn't fire
            setTimeout(doRedirect, 5000);
        })();
    </script>
</body>

</html>
