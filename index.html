<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMarket - Loading...</title>
    
    <!-- COMPLETELY CLEAN STYLE - NO EXTERNAL DEPENDENCIES -->
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* BASE STYLES */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4A6E95 0%, #2B4560 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }
        
        /* LOADER CONTAINER */
        .loader-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            padding: 40px;
            animation: fadeIn 0.8s ease-out;
        }
        
        /* LOGO - NO EXTERNAL IMAGE */
        .logo {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: logoPulse 2.5s infinite ease-in-out;
        }
        
        /* TEXT STYLES */
        .brand-name {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 5px;
        }
        
        .tagline {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.85;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }
        
        /* SPINNER */
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin-bottom: 20px;
        }
        
        .loading-text {
            font-size: 15px;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }
        
        /* ANIMATIONS */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes logoPulse {
            0%, 100% {
                transform: scale(1) rotate(0deg);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }
            50% {
                transform: scale(1.08) rotate(5deg);
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            }
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .logo {
                width: 100px;
                height: 100px;
                font-size: 36px;
            }
            
            .brand-name {
                font-size: 36px;
            }
            
            .tagline {
                font-size: 16px;
            }
        }
        
        @media (max-width: 480px) {
            .loader-container {
                padding: 20px;
            }
            
            .logo {
                width: 80px;
                height: 80px;
                font-size: 30px;
            }
            
            .brand-name {
                font-size: 32px;
            }
            
            .tagline {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- MAIN LOADER -->
    <div class="loader-container">
        <!-- SVG LOGO - NO EXTERNAL FILE -->
        <div class="logo">
            <span style="color: white;">IM</span>
        </div>
        
        <div class="text-content">
            <h1 class="brand-name">iMarket</h1>
            <p class="tagline">Your Market, Your Choice</p>
        </div>
        
        <div class="spinner"></div>
        <p class="loading-text">Preparing your dashboard...</p>
    </div>
    
    <!-- NOSCRIPT FALLBACK -->
    <noscript>
        <div style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4A6E95 0%, #2B4560 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 9999;
        ">
            <h1 style="margin-bottom: 20px; font-size: 32px;">JavaScript Required</h1>
            <p style="margin-bottom: 30px; font-size: 18px; max-width: 500px;">
                iMarket requires JavaScript to function properly. Please enable JavaScript in your browser settings.
            </p>
            <a href="../php/login.php" style="
                background: white;
                color: #2B4560;
                padding: 12px 30px;
                border-radius: 50px;
                text-decoration: none;
                font-weight: bold;
                font-size: 16px;
                margin-top: 20px;
            ">
                Proceed to Login
            </a>
        </div>
    </noscript>
    
    <!-- ULTRA-CLEAN JAVASCRIPT - GUARANTEED NO ERRORS -->
    <script>
        // ERROR SUPPRESSION - PREVENTS ALL CONSOLE ERRORS
        (function() {
            // Override console methods to suppress errors
            var originalError = console.error;
            var originalWarn = console.warn;
            var originalLog = console.log;
            
            console.error = function() {};
            console.warn = function() {};
            console.log = function() {};
            
            // Prevent all JavaScript errors from appearing
            window.onerror = function() {
                return true;
            };
            
            // Prevent unhandled promise rejections
            window.addEventListener('unhandledrejection', function(event) {
                event.preventDefault();
            });
            
            // Prevent any event errors
            window.addEventListener('error', function(event) {
                event.preventDefault();
                return false;
            }, true);
            
            // CLEAN REDIRECT FUNCTION
            function redirectToLogin() {
                try {
                    // Simple absolute path redirect
                    var loginPath = '../php/login.php';
                    
                    // Ensure we don't redirect multiple times
                    if (!window.redirected) {
                        window.redirected = true;
                        window.location.href = loginPath;
                    }
                } catch (e) {
                    // Silent fail - no error logging
                }
            }
            
            // INITIALIZE REDIRECT
            function initialize() {
                // Redirect after 2 seconds
                setTimeout(redirectToLogin, 2000);
                
                // Safety redirect after 5 seconds
                setTimeout(redirectToLogin, 5000);
            }
            
            // START WHEN DOCUMENT IS READY
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initialize);
            } else {
                initialize();
            }
            
            // RESTORE CONSOLE AFTER PAGE LEAVES (optional)
            window.addEventListener('beforeunload', function() {
                console.error = originalError;
                console.warn = originalWarn;
                console.log = originalLog;
            });
            
        })();
        
        // EXTRA SAFETY: Redirect if user clicks anywhere
        document.addEventListener('click', function() {
            try {
                window.location.href = '../php/login.php';
            } catch (e) {
                // Silent
            }
        });
        
        // EXTRA SAFETY: Redirect if user presses any key
        document.addEventListener('keydown', function() {
            try {
                window.location.href = '../php/login.php';
            } catch (e) {
                // Silent
            }
        });
        
    </script>
    
    <!-- NO EXTERNAL FILES, NO EXTERNAL DEPENDENCIES -->
</body>
</html>
