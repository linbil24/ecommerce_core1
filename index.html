<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMarket - Loading...</title>
    
    <link rel="icon" href="data:,">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #4A6E95 0%, #2B4560 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            overflow: hidden;
        }
        body > div {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease-in;
        }
        .logo-box {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px; font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 { margin-bottom: 10px; font-weight: 600; }
        .subtitle { margin-bottom: 30px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px 0;
        }
        #status-text {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.9;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div>
        <div class="logo-box">IM</div>
        <h1 style="font-size: 42px;">iMarket</h1>
        <p class="subtitle" style="opacity: 0.8;">Your Market, Your Choice</p>
        <div class="spinner"></div>
        <p id="status-text">Loading...</p>
    </div>

    <script>
        // Redirect logic with proper path and fallback
        function redirectUser() {
            // Check if user is already logged in by looking for session indicator
            const isLoggedIn = document.cookie.includes('user_id') || document.cookie.includes('PHPSESSID');
            
            const targetUrl = isLoggedIn ? "Content/Dashboard.php" : "php/login.php";
            
            try {
                window.location.replace(targetUrl);
            } catch (e) {
                // Fallback if replace fails
                window.location.href = targetUrl;
            }
        }
        
        // Redirect after page load
        window.addEventListener('load', function() {
            setTimeout(redirectUser, 2000);
        });
        
        // Fallback: redirect if page doesn't load properly
        setTimeout(redirectUser, 5000);
    </script>
</body>
</html>
