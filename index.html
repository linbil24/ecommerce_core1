        function redirectUser() {

                window.location.href = "/php/login.php";
            }
        }
        
        if (document.readyState === 'loading') {
            window.addEventListener('load', function() {
                setTimeout(redirectUser, 2000);
            });
        } else {
            setTimeout(redirectUser, 2000);

        setTimeout(function() {
            redirectUser();
