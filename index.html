<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>iMarket - Loading...</title>
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4A6E95 0%, #2B4560 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }
        .loader-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            animation: fadeIn 0.8s ease-out;
        }
        .logo {
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: logoPulse 2.5s infinite ease-in-out;
        }
        .brand-name { font-size: 48px; font-weight: 800; margin-bottom: 5px; }
        .tagline { font-size: 18px; opacity: 0.85; margin-bottom: 40px; }
        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.15);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="logo"><span>IM</span></div>
        <div class="text-content">
            <h1 class="brand-name">iMarket</h1>
            <p class="tagline">Your Market, Your Choice</p>
        </div>
        <div class="spinner"></div>
        <p>Preparing your dashboard...</p>
    </div>

    <script>
        // Clean redirect function with proper syntax
        function startRedirect() {
            setTimeout(function() {
                // Using quotes around the URL string
                window.location.replace("/ecommerce_core1/php/login.php");
            }, 2000); // 2 second delay
        }

        // Start the redirect when page is fully loaded
        if (document.readyState === "complete") {
            startRedirect();
        } else {
            window.addEventListener("load", startRedirect);
        }

        // Alternative: You can also use this simpler approach
        /*
        window.addEventListener('load', function() {
            setTimeout(function() {
                window.location.href = "/ecommerce_core1/php/login.php";
            }, 2000);
        });
        */
    </script>
</body>
</html>
